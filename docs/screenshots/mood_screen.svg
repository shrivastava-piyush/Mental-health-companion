  <text x="110" y="120" font-family="serif" font-size="22" font-weight="900" fill="white" text-anchor="middle">Locate your center.</text>
  
  <rect x="40" y="220" width="140" height="2" rx="1" fill="white" opacity="0.2"/>
  <circle cx="110" cy="221" r="8" fill="white"/>
  
