<svg xmlns="http://www.w3.org/2000/svg" width="360" height="720" viewBox="0 0 360 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF8F3"/>
      <stop offset="100%" stop-color="#F3EEE7"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#23272A" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="wheelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D7E6D8"/>
      <stop offset="35%" stop-color="#E9E5F5"/>
      <stop offset="65%" stop-color="#FAE2E2"/>
      <stop offset="100%" stop-color="#D7E6D8"/>
    </linearGradient>
  </defs>

  <!-- Status bar -->
  <rect width="360" height="28" fill="#FBF8F3"/>
  <text x="20" y="19" font-family="sans-serif" font-size="11" fill="#6A6F73">9:41</text>
  <circle cx="310" cy="14" r="4" fill="none" stroke="#6A6F73" stroke-width="1.2"/>
  <rect x="322" y="10" width="18" height="8" rx="2" fill="none" stroke="#6A6F73" stroke-width="1.2"/>
  <rect x="324" y="12" width="10" height="4" rx="1" fill="#6F9A74"/>

  <!-- Background -->
  <rect y="28" width="360" height="692" fill="url(#bg)"/>

  <!-- Header -->
  <text x="24" y="72" font-family="sans-serif" font-weight="500" font-size="22" fill="#23272A">How are you, right now?</text>
  <text x="24" y="94" font-family="sans-serif" font-size="13" fill="#6A6F73">Drag the dot to capture valence and energy.</text>

  <!-- Wellness Wheel -->
  <g transform="translate(180,236)">
    <!-- Outer disc -->
    <circle r="118" fill="url(#wheelGrad)" opacity="0.85"/>
    <!-- Petal segments -->
    <path d="M0,-118 A118,118 0 0,1 83.4,-83.4 L0,0 Z" fill="#D7E6D8" opacity="0.7"/>
    <path d="M83.4,-83.4 A118,118 0 0,1 118,0 L0,0 Z" fill="#E9E5F5" opacity="0.6"/>
    <path d="M118,0 A118,118 0 0,1 83.4,83.4 L0,0 Z" fill="#FAE2E2" opacity="0.6"/>
    <path d="M83.4,83.4 A118,118 0 0,1 0,118 L0,0 Z" fill="#D7E6D8" opacity="0.5"/>
    <path d="M0,118 A118,118 0 0,1 -83.4,83.4 L0,0 Z" fill="#E9E5F5" opacity="0.5"/>
    <path d="M-83.4,83.4 A118,118 0 0,1 -118,0 L0,0 Z" fill="#FAE2E2" opacity="0.5"/>
    <path d="M-118,0 A118,118 0 0,1 -83.4,-83.4 L0,0 Z" fill="#B7AEDB" opacity="0.3"/>
    <path d="M-83.4,-83.4 A118,118 0 0,1 0,-118 L0,0 Z" fill="#D7E6D8" opacity="0.5"/>
    <!-- Concentric rings -->
    <circle r="30" fill="none" stroke="#23272A" stroke-opacity="0.06" stroke-width="0.8"/>
    <circle r="60" fill="none" stroke="#23272A" stroke-opacity="0.06" stroke-width="0.8"/>
    <circle r="90" fill="none" stroke="#23272A" stroke-opacity="0.06" stroke-width="0.8"/>
    <circle r="118" fill="none" stroke="#23272A" stroke-opacity="0.06" stroke-width="0.8"/>
    <!-- Centre calm pool -->
    <circle r="38" fill="#FFFFFF" opacity="0.55"/>
    <!-- Labels -->
    <text y="-100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6A6F73">energised</text>
    <text y="108" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6A6F73">calm</text>
    <text x="-98" y="4" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6A6F73">low</text>
    <text x="98" y="4" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6A6F73">high</text>
    <!-- Indicator dot -->
    <circle cx="38" cy="-44" r="16" fill="#23272A" opacity="0.08"/>
    <circle cx="38" cy="-44" r="11" fill="#6F9A74"/>
    <circle cx="38" cy="-44" r="11" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  </g>

  <!-- Mood label chips -->
  <g transform="translate(24,378)">
    <rect width="70" height="30" rx="15" fill="#6F9A74"/>
    <text x="35" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#FBF8F3">grateful</text>
    <rect x="78" width="52" height="30" rx="15" fill="none" stroke="#9DBFA0" stroke-width="1.2"/>
    <text x="104" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6A6F73">calm</text>
    <rect x="138" width="72" height="30" rx="15" fill="none" stroke="#9DBFA0" stroke-width="1.2"/>
    <text x="174" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6A6F73">balanced</text>
    <rect x="218" width="66" height="30" rx="15" fill="none" stroke="#9DBFA0" stroke-width="1.2"/>
    <text x="251" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6A6F73">anxious</text>
    <rect x="292" width="52" height="30" rx="15" fill="none" stroke="#9DBFA0" stroke-width="1.2"/>
    <text x="318" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6A6F73">tired</text>
  </g>

  <!-- Note input -->
  <g transform="translate(24,424)">
    <rect width="312" height="48" rx="12" fill="none" stroke="#9DBFA0" stroke-width="1.2"/>
    <text x="14" y="20" font-family="sans-serif" font-size="10" fill="#6F9A74">Add a note (optional)</text>
    <text x="14" y="36" font-family="sans-serif" font-size="13" fill="#6A6F73">Feeling grounded after a morning walk</text>
  </g>

  <!-- Trend section heading -->
  <text x="24" y="502" font-family="sans-serif" font-weight="600" font-size="15" fill="#23272A">Last 30 days</text>

  <!-- Trend chart card -->
  <rect x="20" y="512" width="320" height="120" rx="18" fill="#FFFFFF" filter="url(#shadow)"/>
  <g transform="translate(36,530)">
    <!-- Grid line -->
    <line x1="0" y1="44" x2="288" y2="44" stroke="#23272A" stroke-opacity="0.06" stroke-width="0.8"/>
    <!-- Area fill -->
    <path d="M0,88 L0,62 C20,58 40,44 60,38 C80,32 100,30 130,36 C160,42 190,52 210,40 C230,28 250,20 270,24 L288,28 L288,88 Z" fill="#6F9A74" opacity="0.15"/>
    <!-- Trend line -->
    <path d="M0,62 C20,58 40,44 60,38 C80,32 100,30 130,36 C160,42 190,52 210,40 C230,28 250,20 270,24 L288,28" fill="none" stroke="#6F9A74" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Dots -->
    <circle cx="210" cy="40" r="3.5" fill="#6F9A74"/><circle cx="210" cy="40" r="2" fill="#FBF8F3"/>
    <circle cx="240" cy="30" r="3.5" fill="#6F9A74"/><circle cx="240" cy="30" r="2" fill="#FBF8F3"/>
    <circle cx="260" cy="24" r="3.5" fill="#6F9A74"/><circle cx="260" cy="24" r="2" fill="#FBF8F3"/>
    <circle cx="288" cy="28" r="3.5" fill="#6F9A74"/><circle cx="288" cy="28" r="2" fill="#FBF8F3"/>
  </g>

  <!-- FAB -->
  <rect x="216" y="648" width="124" height="46" rx="23" fill="#6F9A74" filter="url(#shadow)"/>
  <text x="254" y="676" font-family="sans-serif" font-size="13" font-weight="500" fill="#FBF8F3">✓ Save mood</text>

  <!-- Bottom nav bar -->
  <rect y="692" width="360" height="56" fill="#FFFFFF"/>
  <line x1="0" y1="692" x2="360" y2="692" stroke="#23272A" stroke-opacity="0.05"/>
  <!-- Mood tab (active) -->
  <circle cx="60" cy="712" r="10" fill="none" stroke="#6F9A74" stroke-width="1.6"/>
  <path d="M54,712 Q57,706 60,710 Q63,706 66,712" fill="none" stroke="#6F9A74" stroke-width="1.4"/>
  <text x="60" y="734" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6F9A74" font-weight="600">Mood</text>
  <!-- Journal tab -->
  <rect x="170" y="704" width="14" height="16" rx="2" fill="none" stroke="#6A6F73" stroke-width="1.2"/>
  <line x1="173" y1="709" x2="181" y2="709" stroke="#6A6F73" stroke-width="1"/>
  <line x1="173" y1="713" x2="180" y2="713" stroke="#6A6F73" stroke-width="1"/>
  <text x="180" y="734" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6A6F73">Journal</text>
  <!-- Insights tab -->
  <polyline points="288,718 294,708 300,714 306,704" fill="none" stroke="#6A6F73" stroke-width="1.4" stroke-linecap="round"/>
  <text x="300" y="734" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6A6F73">Insights</text>
</svg>
