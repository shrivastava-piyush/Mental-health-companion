<svg xmlns="http://www.w3.org/2000/svg" width="360" height="720" viewBox="0 0 360 720">
  <defs>
    <linearGradient id="liquidGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0D12"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Deep Liquid Background -->
  <rect width="360" height="720" fill="#0D0D12"/>
  
  <!-- Aura Blobs -->
  <circle cx="100" cy="150" r="180" fill="#6F9A74" opacity="0.3" filter="url(#blur)"/>
  <circle cx="300" cy="400" r="150" fill="#E11D48" opacity="0.2" filter="url(#blur)"/>
  <circle cx="150" cy="650" r="160" fill="#B7AEDB" opacity="0.25" filter="url(#blur)"/>

  <!-- Content -->
  <g transform="translate(180,300)">
    <!-- Iconic Lock Shield -->
    <circle r="60" fill="white" opacity="0.05"/>
    <path d="M-20,-15 L20,-15 L20,10 C20,25 0,35 0,35 C0,35 -20,25 -20,10 Z" fill="none" stroke="#6F9A74" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cy="-5" r="5" fill="#6F9A74"/>
  </g>

  <text x="180" y="420" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="28" fill="white" letter-spacing="-0.5">Sanctuary</text>
  <text x="180" y="450" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" opacity="0.5" font-style="italic">Your private mental health space.</text>

  <!-- Action -->
  <rect x="80" y="520" width="200" height="56" rx="28" fill="#6F9A74"/>
  <text x="180" y="555" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">Unlock with FaceID</text>

  <!-- Footer -->
  <text x="180" y="680" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="900" fill="white" opacity="0.3" letter-spacing="2">LOCAL ENCRYPTION ACTIVE</text>
</svg>
