<svg xmlns="http://www.w3.org/2000/svg" width="360" height="720" viewBox="0 0 360 720">
  <defs>
    <linearGradient id="gateBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D7E6D8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FBF8F3"/>
    </linearGradient>
  </defs>

  <!-- Status bar -->
  <rect width="360" height="28" fill="#D7E6D8" opacity="0.55"/>
  <text x="20" y="19" font-family="sans-serif" font-size="11" fill="#6A6F73">9:41</text>
  <circle cx="310" cy="14" r="4" fill="none" stroke="#6A6F73" stroke-width="1.2"/>
  <rect x="322" y="10" width="18" height="8" rx="2" fill="none" stroke="#6A6F73" stroke-width="1.2"/>
  <rect x="324" y="12" width="10" height="4" rx="1" fill="#6F9A74"/>

  <!-- Background gradient -->
  <rect y="28" width="360" height="692" fill="url(#gateBg)"/>

  <!-- Fingerprint icon -->
  <g transform="translate(180,280)">
    <!-- Outer ring pulse -->
    <circle r="60" fill="#6F9A74" opacity="0.06"/>
    <circle r="48" fill="#6F9A74" opacity="0.08"/>

    <!-- Fingerprint arcs -->
    <path d="M-18,-28 C-18,-28 -28,-14 -28,2 C-28,18 -18,32 -4,36" fill="none" stroke="#6F9A74" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M-8,-30 C-8,-30 -20,-12 -20,4 C-20,22 -8,34 8,36" fill="none" stroke="#6F9A74" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M4,-28 C4,-28 -10,-8 -10,6 C-10,22 2,32 16,34" fill="none" stroke="#6F9A74" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M14,-24 C14,-24 0,-4 0,10 C0,24 10,30 22,30" fill="none" stroke="#6F9A74" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M22,-18 C22,-18 10,0 10,14 C10,24 18,28 28,26" fill="none" stroke="#6F9A74" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M28,-10 C28,-10 18,4 18,14 C18,22 24,24 30,22" fill="none" stroke="#6F9A74" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="180" y="380" text-anchor="middle" font-family="sans-serif" font-weight="500" font-size="22" fill="#23272A">Wellness Companion</text>

  <!-- Subtitle -->
  <text x="180" y="412" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6A6F73">Private by design.</text>
  <text x="180" y="430" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6A6F73">Unlock with your biometric to continue.</text>

  <!-- Unlock button -->
  <rect x="120" y="470" width="120" height="44" rx="22" fill="#6F9A74"/>
  <text x="180" y="497" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#FBF8F3">Unlock</text>

  <!-- Subtle bottom text -->
  <text x="180" y="660" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6A6F73" opacity="0.6">Your entries stay on this device.</text>
</svg>
