<svg xmlns="http://www.w3.org/2000/svg" width="360" height="720" viewBox="0 0 360 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF8F3"/>
      <stop offset="100%" stop-color="#F3EEE7"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#23272A" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Status bar -->
  <rect width="360" height="28" fill="#FBF8F3"/>
  <text x="20" y="19" font-family="sans-serif" font-size="11" fill="#6A6F73">9:41</text>
  <circle cx="310" cy="14" r="4" fill="none" stroke="#6A6F73" stroke-width="1.2"/>
  <rect x="322" y="10" width="18" height="8" rx="2" fill="none" stroke="#6A6F73" stroke-width="1.2"/>
  <rect x="324" y="12" width="10" height="4" rx="1" fill="#6F9A74"/>

  <!-- Background -->
  <rect y="28" width="360" height="692" fill="url(#bg)"/>

  <!-- Header -->
  <text x="24" y="72" font-family="sans-serif" font-weight="500" font-size="22" fill="#23272A">Your journal</text>
  <text x="24" y="94" font-family="sans-serif" font-size="13" fill="#6A6F73">On-device only. Not backed up, not shared.</text>

  <!-- Entry card 1 -->
  <rect x="20" y="118" width="320" height="72" rx="18" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="36" y="146" font-family="sans-serif" font-weight="600" font-size="15" fill="#23272A">Morning clarity</text>
  <text x="268" y="146" font-family="sans-serif" font-size="11" fill="#6A6F73">Apr 16</text>
  <text x="36" y="170" font-family="sans-serif" font-size="12" fill="#6A6F73">342 words</text>

  <!-- Entry card 2 -->
  <rect x="20" y="204" width="320" height="72" rx="18" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="36" y="232" font-family="sans-serif" font-weight="600" font-size="15" fill="#23272A">Grateful for small things</text>
  <text x="268" y="232" font-family="sans-serif" font-size="11" fill="#6A6F73">Apr 15</text>
  <text x="36" y="256" font-family="sans-serif" font-size="12" fill="#6A6F73">128 words</text>

  <!-- Entry card 3 -->
  <rect x="20" y="290" width="320" height="72" rx="18" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="36" y="318" font-family="sans-serif" font-weight="600" font-size="15" fill="#23272A">Rainy afternoon reflections</text>
  <text x="268" y="318" font-family="sans-serif" font-size="11" fill="#6A6F73">Apr 14</text>
  <text x="36" y="342" font-family="sans-serif" font-size="12" fill="#6A6F73">567 words</text>

  <!-- Entry card 4 -->
  <rect x="20" y="376" width="320" height="72" rx="18" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="36" y="404" font-family="sans-serif" font-weight="600" font-size="15" fill="#23272A">First long run in months</text>
  <text x="268" y="404" font-family="sans-serif" font-size="11" fill="#6A6F73">Apr 13</text>
  <text x="36" y="428" font-family="sans-serif" font-size="12" fill="#6A6F73">204 words</text>

  <!-- Entry card 5 -->
  <rect x="20" y="462" width="320" height="72" rx="18" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="36" y="490" font-family="sans-serif" font-weight="600" font-size="15" fill="#23272A">Weekend intention setting</text>
  <text x="268" y="490" font-family="sans-serif" font-size="11" fill="#6A6F73">Apr 12</text>
  <text x="36" y="514" font-family="sans-serif" font-size="12" fill="#6A6F73">89 words</text>

  <!-- Entry card 6 -->
  <rect x="20" y="548" width="320" height="72" rx="18" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="36" y="576" font-family="sans-serif" font-weight="600" font-size="15" fill="#23272A">Breathing exercise notes</text>
  <text x="268" y="576" font-family="sans-serif" font-size="11" fill="#6A6F73">Apr 11</text>
  <text x="36" y="600" font-family="sans-serif" font-size="12" fill="#6A6F73">156 words</text>

  <!-- FAB -->
  <rect x="216" y="648" width="124" height="46" rx="23" fill="#6F9A74" filter="url(#shadow)"/>
  <text x="256" y="676" font-family="sans-serif" font-size="13" font-weight="500" fill="#FBF8F3">+ New entry</text>

  <!-- Bottom nav bar -->
  <rect y="692" width="360" height="56" fill="#FFFFFF"/>
  <line x1="0" y1="692" x2="360" y2="692" stroke="#23272A" stroke-opacity="0.05"/>
  <!-- Mood tab -->
  <circle cx="60" cy="712" r="10" fill="none" stroke="#6A6F73" stroke-width="1.2"/>
  <path d="M54,712 Q57,706 60,710 Q63,706 66,712" fill="none" stroke="#6A6F73" stroke-width="1.2"/>
  <text x="60" y="734" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6A6F73">Mood</text>
  <!-- Journal tab (active) -->
  <rect x="170" y="704" width="14" height="16" rx="2" fill="none" stroke="#6F9A74" stroke-width="1.6"/>
  <line x1="173" y1="709" x2="181" y2="709" stroke="#6F9A74" stroke-width="1.2"/>
  <line x1="173" y1="713" x2="180" y2="713" stroke="#6F9A74" stroke-width="1.2"/>
  <text x="180" y="734" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6F9A74" font-weight="600">Journal</text>
  <!-- Insights tab -->
  <polyline points="288,718 294,708 300,714 306,704" fill="none" stroke="#6A6F73" stroke-width="1.4" stroke-linecap="round"/>
  <text x="300" y="734" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6A6F73">Insights</text>
</svg>
