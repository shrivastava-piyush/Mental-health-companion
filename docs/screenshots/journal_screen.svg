<svg xmlns="http://www.w3.org/2000/svg" width="360" height="720" viewBox="0 0 360 720">
  <rect width="360" height="720" fill="#0D0D12"/>
  
  <text x="28" y="80" font-family="sans-serif" font-weight="900" font-size="34" fill="white">Reflections</text>
  <text x="28" y="105" font-family="sans-serif" font-size="14" fill="white" opacity="0.5">Captured in sanctuary</text>

  <!-- Themes -->
  <text x="28" y="160" font-family="sans-serif" font-size="10" font-weight="900" fill="white" opacity="0.4" letter-spacing="1">THEMES</text>
  <rect x="28" y="180" width="140" height="120" rx="32" fill="white" opacity="0.08"/>
  <circle cx="58" cy="210" r="16" fill="#312E81" opacity="0.3"/>
  <path d="M54,210 L62,210 M58,206 L58,214" stroke="cyan" stroke-width="2"/>
  <text x="48" y="245" font-family="sans-serif" font-weight="bold" font-size="14" fill="white">Morning</text>
  <text x="48" y="262" font-family="sans-serif" font-size="10" fill="white" opacity="0.5">4 entries</text>

