<svg xmlns="http://www.w3.org/2000/svg" width="360" height="720" viewBox="0 0 360 720">
  <rect width="360" height="720" fill="#0D0D12"/>
  
  <text x="28" y="80" font-family="sans-serif" font-weight="900" font-size="34" fill="white">Patterns</text>
  <text x="28" y="105" font-family="sans-serif" font-size="14" fill="white" opacity="0.5">Gentle observations</text>

  <!-- Stats -->
  <rect x="28" y="140" width="144" height="110" rx="32" fill="white" opacity="0.08"/>
  <text x="48" y="200" font-family="sans-serif" font-weight="900" font-size="28" fill="white">12</text>
  <text x="48" y="220" font-family="sans-serif" font-weight="900" font-size="10" fill="white" opacity="0.4">LOGS</text>

  <rect x="188" y="140" width="144" height="110" rx="32" fill="white" opacity="0.08"/>
  <text x="208" y="200" font-family="sans-serif" font-weight="900" font-size="28" fill="white">8</text>
  <text x="208" y="220" font-family="sans-serif" font-weight="900" font-size="10" fill="white" opacity="0.4">NOTES</text>

  <!-- Flow Chart -->
  <text x="28" y="300" font-family="sans-serif" font-size="10" font-weight="900" fill="white" opacity="0.4" letter-spacing="1">EMOTIONAL FLOW</text>
