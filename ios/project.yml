name: WellnessCompanion
options:
  bundleIdPrefix: com.wellness.companion
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    INFOPLIST_FILE: WellnessCompanion/App/Info.plist

targets:
  WellnessCompanion:
    type: application
    platform: iOS
    sources:
      - path: WellnessCompanion
      # Core llama.cpp sources
      - path: ../app/src/main/cpp/llama.cpp/src/llama-model-loader.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-cparams.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-vocab.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-kv-cache.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-grammar.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-io.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-hparams.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-memory-recurrent.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-memory-hybrid.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-graph.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-kv-cache-iswa.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-quant.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-impl.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-arch.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-model.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-mmap.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-batch.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-memory.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-context.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-chat.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/unicode-data.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-memory-hybrid-iswa.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-sampler.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-model-saver.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/unicode.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/llama-adapter.cpp
      - path: ../app/src/main/cpp/llama.cpp/src/models
      # GGML Core
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml.c
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml.cpp
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-alloc.c
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-backend.cpp
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-backend-dl.cpp
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-backend-reg.cpp
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-backend-meta.cpp
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-threading.cpp
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/gguf.cpp
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-opt.cpp
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-quants.c
      # GGML-CPU (Explicitly no kleidiai/spacemit)
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-cpu/ggml-cpu.c
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-cpu/ggml-cpu.cpp
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-cpu/quants.c
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-cpu/repack.cpp
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-cpu/vec.cpp
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-cpu/ops.cpp
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-cpu/binary-ops.cpp
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-cpu/unary-ops.cpp
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-cpu/traits.cpp
      # Arch-specific
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-cpu/arch/arm/quants.c
        name: ggml-quants-arm.c
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-cpu/arch/arm/cpu-feats.cpp
      - path: ../app/src/main/cpp/llama.cpp/ggml/src/ggml-cpu/arch/arm/repack.cpp
        name: ggml-repack-arm.cpp
      # Atmosphere & Visuals
      - path: WellnessCompanion/Domain/Atmosphere/AtmosphereManager.swift
      - path: WellnessCompanion/App/WellnessContentProvider.swift
      - path: WellnessCompanion/UI/Components/AnimatedQuoteView.swift
      - path: WellnessCompanion/UI/Components/MirrorAvatar.swift
      - path: WellnessCompanion/UI/Components/FlowLayout.swift
      - path: WellnessCompanion/UI/Components/LiquidAura.swift
      - path: WellnessCompanion/App/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wellness.companion
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        OTHER_CFLAGS: "-DGGML_USE_CPU -DNDEBUG -O3 -DGGML_VERSION=\\\"1\\\" -DGGML_COMMIT=\\\"unknown\\\""
        OTHER_CPLUSPLUSFLAGS: "$(inherited) -DGGML_USE_CPU -DNDEBUG -O3 -DGGML_VERSION=\\\"1\\\" -DGGML_COMMIT=\\\"unknown\\\""
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/../app/src/main/cpp/llama.cpp/include"
          - "$(SRCROOT)/../app/src/main/cpp/llama.cpp/ggml/include"
          - "$(SRCROOT)/../app/src/main/cpp/llama.cpp/common"
          - "$(SRCROOT)/../app/src/main/cpp/llama.cpp/src"
          - "$(SRCROOT)/../app/src/main/cpp/llama.cpp/src/models"
          - "$(SRCROOT)/../app/src/main/cpp/llama.cpp/ggml/src"
          - "$(SRCROOT)/../app/src/main/cpp/llama.cpp/ggml/src/ggml-cpu"
          - "$(SRCROOT)/../app/src/main/cpp/llama.cpp/ggml/src/ggml-cpu/arch/arm"
        SWIFT_OBJC_BRIDGING_HEADER: "WellnessCompanion/App/BridgingHeader.h"
    info:
      path: WellnessCompanion/App/Info.plist
      properties:
        NSFaceIDUsageDescription: "Unlock your wellness journal"
        NSPhotoLibraryUsageDescription: "Personalize your sanctuary with your own memories."
        UILaunchScreen: {}

  WellnessCompanionTests:
    type: bundle.unit-test
    platform: iOS
    sources: [WellnessCompanionTests]
    dependencies:
      - target: WellnessCompanion
    settings:
      base:
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/../app/src/main/cpp/llama.cpp/include"
          - "$(SRCROOT)/../app/src/main/cpp/llama.cpp/ggml/include"
          - "$(SRCROOT)/../app/src/main/cpp/llama.cpp/common"
